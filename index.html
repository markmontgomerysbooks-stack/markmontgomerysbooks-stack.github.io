<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mark Picasso — Writer. Builder. Humanitarian.</title>
<meta name="description" content="Mark Picasso, MPA — author, humanitarian app builder, musician, and filmmaker based in Eugene, Oregon." />

<style>
  :root {
    --ink: #1a1a18;
    --ink-soft: #5a5a56;
    --ink-faint: #9a9a94;
    --page: #faf9f6;
    --surface: #f2f0eb;
    --border: rgba(26,26,24,0.12);
    --teal: #0f6e56;
    --teal-light: #e1f5ee;
    --teal-mid: #1d9e75;
    --serif: 'Georgia', 'Times New Roman', serif;
    --sans: system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--page);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.7;
  }

  nav {
    position: sticky;
    top: 0;
    background: var(--page);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
  }

  .nav-logo {
    font-family: var(--serif);
    text-decoration: none;
    color: var(--ink);
  }

  .nav-links {
    display: flex;
    gap: 24px;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--ink-soft);
    font-size: 13px;
  }

  .hero {
    max-width: 680px;
    margin: auto;
    padding: 80px 32px;
    text-align: center;
  }

  .btn-primary {
    background: var(--teal);
    color: white;
    padding: 11px 24px;
    border-radius: 6px;
    text-decoration: none;
    display: inline-block;
    border: none;
    cursor: pointer;
  }

  section {
    max-width: 760px;
    margin: auto;
    padding: 56px 32px;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .footer-links {
    display: flex;
    gap: 20px;
    list-style: none;
    align-items: center;
  }

  .footer-links a {
    text-decoration: none;
    color: var(--ink-soft);
    font-size: 13px;
  }

  .copy-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
  }
</style>
</head>

<body>

<nav>
  <a class="nav-logo" href="#">Mark Picasso</a>
  <ul class="nav-links">
    <li><a href="#books">Books</a></li>
    <li><a href="#apps">Apps</a></li>
    <li><a href="#music">Music & Film</a></li>
    <li><a href="#support">Support</a></li>
  </ul>
</nav>

<div class="hero">
  <h1>Writer. Builder. Humanitarian.</h1>
  <p>I build tools and stories for healing, education, and displaced communities.</p>
  <a class="btn-primary" href="#books">Read my books</a>
</div>

<section id="books">
  <h2>Books</h2>
</section>

<section id="apps">
  <h2>Apps</h2>
</section>

<section id="music">
  <h2>Music & Film</h2>
</section>

<section id="support">
  <h2>Support</h2>
</section>

<footer>
  <span>© Mark Picasso, MPA · Eugene, Oregon</span>

  <ul class="footer-links">
    <li>
      <a href="https://www.pinterest.com/Markpicassompa/" target="_blank" rel="noopener">
        Pinterest
      </a>
    </li>

    <li>
      <button class="copy-btn"
        onclick="navigator.clipboard.writeText('https://www.pinterest.com/Markpicassompa/')">
        Copy Pinterest
      </button>
    </li>

    <li><a href="https://substack.com" target="_blank">Substack</a></li>
    <li><a href="https://github.com/markmontgomerysbooks-stack" target="_blank">GitHub</a></li>
  </ul>
</footer>

</body>
</html>
